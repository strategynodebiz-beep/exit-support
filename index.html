<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退職の決意支援ジェネレーター | 心の負担を最小限に</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 20px; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        p { font-size: 14px; color: #666; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #3498db; color: white; padding: 15px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        #result { margin-top: 25px; padding: 15px; background: #e8f4fd; border-radius: 6px; display: none; white-space: pre-wrap; font-size: 15px; border-left: 5px solid #3498db; }
        .affiliate-section { margin-top: 30px; padding: 15px; background: #fff5f5; border: 1px solid #feb2b2; border-radius: 6px; text-align: center; }
        .affiliate-section h2 { font-size: 16px; color: #c53030; margin-top: 0; }
        .affiliate-link { display: inline-block; background: #c53030; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>退職の決意支援ツール</h1>
        <p>「もう限界だけど、なんて言えばいいかわからない」あなたへ。角が立たず、かつ確実に伝わるフレーズを生成します。</p>
        
        <label>今の状況は？</label>
        <select id="reason">
            <option value="burnout">人間関係・精神的な限界</option>
            <option value="health">体調不良（通院など）</option>
            <option value="family">家庭の事情・介護</option>
            <option value="next">次のステップへ進みたい</option>
        </select>

        <label>伝え方は？</label>
        <select id="method">
            <option value="line">LINE/メール用</option>
            <option value="letter">正式な退職願用</option>
        </select>

        <button onclick="generate()">フレーズを生成する</button>

        <div id="result"></div>

        <div class="affiliate-section">
            <h2>どうしても自分で送るのが怖い方へ</h2>
            <p>この文章すら送る気力が湧かないほど疲弊しているなら、プロに任せて即日退職する道もあります。あなたの心を守るのが最優先です。</p>
            <a href="ここにアフィリエイトリンクを入れる" class="affiliate-link">退職代行サービスの詳細を見る</a>
        </div>
    </div>

    <script>
        function generate() {
            const reason = document.getElementById('reason').value;
            const method = document.getElementById('method').value;
            let text = "";

            const templates = {
                burnout: "一身上の都合により、これ以上業務を継続することが困難な状況となりました。",
                health: "体調不良が続いており、医師の診断の結果、療養に専念せざるを得なくなりました。",
                family: "家庭の事情により、急遽生活環境を整える必要が生じ、現在の勤務継続が難しくなりました。",
                next: "自身の将来を真剣に検討した結果、新たな挑戦をしたいという結論に至りました。"
            };

            if(method === 'line') {
                text = "お疲れ様です。突然のご連絡となり申し訳ありません。\n\n" + templates[reason] + "\n誠に勝手ながら、本日をもちまして退職させていただきたく、ご報告申し上げます。本来であれば直接お伝えすべきところ、このような形でのご連絡となることを深くお詫び申し上げます。\n今後の手続き等については、追ってご相談させていただけますと幸いです。";
            } else {
                text = "退職願\n\n私儀\n\nこの度、" + templates[reason] + "\nにつき、令和〇年〇月〇日をもって退職いたしたく、ここにお願い申し上げます。\n\n令和〇年〇月〇日\n〇〇 〇〇 殿";
            }

            const resultDiv = document.getElementById('result');
            resultDiv.innerText = text;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
