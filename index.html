<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退職おまもり | モチマルが寄り添う退職支援</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7FA18C; --bg-soft: rgba(244, 247, 244, 0.92); --card-bg: rgba(255, 255, 255, 0.95); --text-main: #2C3E35; --text-muted: #728A7C; --accent-bg: #E8F0EA; }
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            margin: 0; 
            padding: 20px 15px; 
            color: var(--text-main); 
            line-height: 1.8;
            background-image: url('-is6kdx.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.1); z-index: -1; }

        .container { 
            max-width: 550px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 35px 25px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            backdrop-filter: blur(5px);
        }

        .mochimaru-head { text-align: center; margin-bottom: 20px; }
        .mochimaru-head img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .header-area { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 20px; font-weight: 700; margin: 10px 0; color: var(--text-main); }
        .speech-bubble { background: var(--accent-bg); padding: 15px; border-radius: 15px; font-size: 14px; position: relative; margin-bottom: 20px; }
        .speech-bubble::after { content: ""; position: absolute; top: -10px; left: 50%; margin-left: -10px; border-width: 0 10px 10px 10px; border-style: solid; border-color: transparent transparent var(--accent-bg) transparent; }

        label { display: block; margin-top: 20px; font-weight: 700; font-size: 14px; }
        select { width: 100%; padding: 14px; margin-top: 8px; border: 1px solid #D1E0D7; border-radius: 12px; font-size: 15px; background: #FAFAFA; color: var(--text-main); appearance: none; font-family: inherit; }
        
        button { width: 100%; background: linear-gradient(135deg, #7FA18C 0%, #5E806B 100%); color: white; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; margin-top: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(127, 161, 140, 0.4); }
        
        #result { margin-top: 25px; padding: 20px; background: #F0F4F1; border-radius: 15px; display: none; white-space: pre-wrap; font-size: 15px; border-left: 5px solid var(--primary); animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .cta-section { margin-top: 40px; padding: 20px; background: #FFF5F5; border-radius: 15px; text-align: center; }
        .cta-section a { display: inline-block; background: #E53E3E; color: white; padding: 14px 24px; text-decoration: none; border-radius: 10px; font-weight: 700; margin-top: 10px; }

        .info-box { margin-top: 30px; padding: 20px; background: #FDFBF7; border-radius: 15px; border: 1px dashed var(--primary); }
        .info-box h2 { font-size: 16px; color: #5E806B; margin-top: 0; text-align: center; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <div class="mochimaru-head">
            <img src="1777073833694.png" alt="モチマル">
        </div>
        
        <div class="header-area">
            <div class="speech-bubble">
                「よくがんばったね。もう、自分を責めなくていいんだよ。ぼくがあなたの代わりに言葉を準備したよ。お茶を飲んで、ゆっくり選んでね🍵」
            </div>
            <h1>退職メッセージ生成ツール</h1>
        </div>
        
        <label>今のきもちは？</label>
        <select id="reason">
            <option value="burnout">人間関係・精神的に限界</option>
            <option value="health">体調がよくない（療養したい）</option>
            <option value="family">家庭の事情で続けられない</option>
            <option value="next">新しい場所へ進みたい</option>
        </select>

        <label>伝え方はどうする？</label>
        <select id="method">
            <option value="line">LINE・メールで送る</option>
            <option value="letter">退職願（正式な形）を作る</option>
        </select>

        <button onclick="generate()">おまもりの言葉を作る</button>

        <div id="result"></div>

        <div class="cta-section">
            <p style="font-size: 13px; margin: 0; color: #4A5568;">どうしても、自分で送るのが怖いときは…</p>
            <a href="https://www.gaia-law-office.jp/taisyoku/index.html">プロに退職代行を頼む</a>
            </div>

        <div class="info-box">
            <h2>🌿 お金が心配なあなたへ</h2>
            <p style="font-size: 13px; color: #4A5568;">
                「辞めたら生活できない…」と不安だよね。<br>
                でも大丈夫。<strong>『傷病手当金』</strong>を使えば、最大1年半、お給料の約3分の2をもらいながら休める可能性があるんだよ。今はゆっくり休むことを一番に考えてね。
            </p>
            <p style="text-align: center; font-size: 12px; font-weight: 700; color: var(--primary);">※世界一やさしい申請ガイドを準備中🐾</p>
        </div>
    </div>

    <script>
        function generate() {
            const reason = document.getElementById('reason').value;
            const method = document.getElementById('method').value;
            let text = "";
            const templates = {
                burnout: "一身上の都合により、これ以上業務を継続することが困難な状況となりました。",
                health: "体調不良が続いており、医師の診断や自身の判断の結果、まずは療養に専念せざるを得なくなりました。",
                family: "家庭の事情により、急遽生活環境を整える必要が生じ、現在の勤務継続が難しくなりました。",
                next: "自身の将来を真剣に検討した結果、新たな環境へ挑戦したいという結論に至りました。"
            };
            if(method === 'line') {
                text = "お疲れ様です。突然のご連絡となり申し訳ありません。\n\n" + templates[reason] + "\n誠に勝手ながら、本日をもちまして退職させていただきたく、ご報告申し上げます。\n\n本来であれば直接お伝えすべきところ、このような形でのご連絡となることを深くお詫び申し上げます。";
            } else {
                text = "退職願\n\n私儀\n\nこの度、" + templates[reason] + "\nにつき、令和〇年〇月〇日をもって退職いたしたく、ここにお願い申し上げます。\n\n令和〇年〇月〇日\n〇〇 〇〇 殿";
            }
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = text;
            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
